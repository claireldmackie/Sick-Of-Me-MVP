<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Sick of Me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&family=Reenie+Beanie&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=13">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="1920" height="1080"></canvas>

        <!-- Homepage / Title Screen -->
        <div id="homepage-screen" class="screen-overlay">
            <div class="homepage-menu">
                <button id="btn-continue" class="ui-btn hidden"><span>Load Game</span></button>
                <button id="btn-new-game" class="ui-btn-text">New Game</button>
                <button id="btn-quit-home" class="ui-btn-text">Quit</button>
            </div>
        </div>

        <!-- In-Game HUD -->
        <div id="hud" class="hidden">
            <button id="hud-hamburger" class="hud-icon" title="Menu">
                <svg viewBox="0 0 30 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="2" y1="4" x2="28" y2="4"/>
                    <line x1="2" y1="12" x2="28" y2="12"/>
                    <line x1="2" y1="20" x2="28" y2="20"/>
                </svg>
            </button>
            <button id="hud-envelope" class="hud-icon" title="Letters">
                <svg viewBox="0 0 32 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="1" width="30" height="22" rx="2"/>
                    <polyline points="1,1 16,14 31,1"/>
                </svg>
                <span id="letter-badge" class="hidden">0</span>
            </button>
        </div>

        <!-- Pause Menu -->
        <div id="pause-overlay" class="screen-overlay hidden">
            <div class="modal-panel">
                <button class="close-btn" data-close="pause"><img src="assets/ui/x-close.png" alt="Close"></button>
                <div class="panel-content">
                    <img src="assets/ui/volume-title.png" alt="Volume" class="panel-title-img">
                    <div class="volume-row">
                        <input type="range" id="volume-slider" min="0" max="100" value="45">
                    </div>
                    <button id="btn-save" class="ui-btn"><span>Save</span></button>
                    <button id="btn-quit-pause" class="ui-btn-text">Quit Game</button>
                </div>
            </div>
        </div>

        <!-- Save Files Panel -->
        <div id="save-panel" class="screen-overlay hidden">
            <div class="modal-panel">
                <button class="back-btn" id="save-back-btn">&#8592;</button>
                <div class="panel-content">
                    <div id="save-panel-title">
                        <img src="assets/ui/save-files-title.png" alt="Save Files" class="panel-title-img" id="save-title-img">
                        <span id="save-title-text" class="panel-title-text hidden"></span>
                    </div>
                    <div class="save-slots">
                        <button class="save-slot" data-slot="0">
                            <span class="slot-label">Save 1</span>
                            <span class="slot-info">Empty</span>
                        </button>
                        <button class="save-slot" data-slot="1">
                            <span class="slot-label">Save 2</span>
                            <span class="slot-info">Empty</span>
                        </button>
                        <button class="save-slot" data-slot="2">
                            <span class="slot-label">Save 3</span>
                            <span class="slot-info">Empty</span>
                        </button>
                    </div>
                    <div class="save-actions" id="save-actions">
                        <button id="btn-save-quit" class="text-btn hidden">Quit to Menu</button>
                        <button id="btn-delete" class="text-btn">
                            <img src="assets/ui/delete-normal.png" alt="Delete" class="delete-img" id="delete-img">
                        </button>
                    </div>
                    <div class="save-actions hidden" id="load-actions">
                        <button id="btn-load-delete" class="text-btn">Delete</button>
                        <button id="btn-start-game" class="text-btn">Start Game</button>
                    </div>
                    <div class="save-actions hidden" id="save-actions-cancel">
                        <button id="btn-cancel-action" class="text-btn">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Confirmation Dialog -->
        <div id="confirm-dialog" class="screen-overlay hidden">
            <div class="modal-panel">
                <button class="close-btn" data-close="confirm"><img src="assets/ui/x-close.png" alt="Close"></button>
                <div class="panel-content confirm-content">
                    <p id="confirm-message"></p>
                    <button id="btn-confirm-yes" class="ui-btn"><span>Yes</span></button>
                    <button id="btn-confirm-no" class="ui-btn-text">No</button>
                </div>
            </div>
        </div>

        <!-- Letter Viewer -->
        <div id="letter-viewer" class="screen-overlay hidden">
            <div class="letter-container">
                <p id="letter-title">Letter #1</p>
                <button class="close-btn letter-close" data-close="letter"><img src="assets/ui/x-close.png" alt="Close"></button>
                <button id="letter-prev" class="letter-arrow letter-arrow-left" aria-label="Previous letter">&#8592;</button>
                <div id="letter-paper">
                    <p id="letter-content"></p>
                </div>
                <button id="letter-next" class="letter-arrow letter-arrow-right" aria-label="Next letter">&#8594;</button>
            </div>
        </div>

        <!-- Tutorial Prompt -->
        <div id="tutorial-prompt" class="hidden">
            <img src="assets/ui/controls.png" alt="Controls">
        </div>

        <!-- Dialogue Options (branching) -->
        <div id="dialogue-options" class="hidden">
            <p id="options-prompt"></p>
            <div id="options-buttons"></div>
        </div>

        <!-- Credits Overlay -->
        <div id="credits-overlay" class="screen-overlay hidden">
            <div class="credits-content">
                <h1>Sick of Me</h1>
                <p>Thank you for playing.</p>
                <button class="close-btn credits-close" data-close="credits"><img src="assets/ui/x-close.png" alt="Close"></button>
            </div>
        </div>

        <!-- Gameplay overlays (existing) -->
        <div id="dialogue-box" class="hidden">
            <span id="dialogue-speaker"></span>
            <p id="dialogue-text"></p>
            <button id="skip-btn" title="Skip dialogue (dev only)">Skip &gt;&gt;</button>
        </div>

        <div id="narration-box" class="hidden">
            <p id="narration-text"></p>
        </div>

        <div id="closeup-overlay" class="hidden">
            <div id="closeup-content"></div>
            <div id="closeup-dialogue-box" class="hidden">
                <span id="closeup-speaker"></span>
                <p id="closeup-text"></p>
            </div>
        </div>
        <!-- Dev: Scene Selector & Reset -->
        <div id="dev-tools" class="hidden">
            <div id="scene-selector">
                <button id="btn-select-scene">Select Scene</button>
                <div id="scene-list" class="hidden"></div>
            </div>
            <button id="btn-reset-sim">Reset simulation</button>
        </div>

        <!-- Dev Toggle (always visible) -->
        <label id="dev-toggle">
            <input type="checkbox" id="dev-toggle-check">
            <span>Dev Tools</span>
        </label>
    </div>

    <script src="js/audio-manager.js?v=4"></script>
    <script src="js/engine.js?v=4"></script>
    <script src="js/input.js?v=3"></script>
    <script src="js/dialogue.js?v=3"></script>
    <script src="js/save-manager.js?v=3"></script>
    <script src="js/letter-manager.js?v=3"></script>
    <script src="js/scene-manager.js?v=10"></script>
    <script src="js/ui-manager.js?v=9"></script>
    <script src="js/main.js?v=15"></script>
</body>
</html>
